name: Deploy Web to GitHub Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: 'pages'
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Set Vite base automatically to "/<repo>/" for GitHub Pages
      - name: Build
        env:
          VITE_BASE: '/${{ github.event.repository.name }}/'
          VITE_GAS_BASE_URL: ${{ secrets.VITE_GAS_BASE_URL }}
        run: npm run build
      # SPA routing fallback for GitHub Pages
      - name: Create 404.html for SPA
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
